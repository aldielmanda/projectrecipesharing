{% extends 'base.html' %} {% block content %}
<h2 class="fw-bold mb-4">Resep Koleksi Favorit Saya</h2>
<div class="row row-cols-1 row-cols-md-3 g-4">
  {% for r in recipes %}
  <div class="col">
    <div
      class="card h-100 shadow-sm border-0 rounded-4 overflow-hidden bg-white"
    >
      <div class="card-body p-4">
        <span class="badge bg-secondary mb-2">{{ r.category | upper }}</span>
        <h5 class="card-title fw-bold">{{ r.title }}</h5>
        <p class="text-muted small">Kreator: {{ r.author.username }}</p>
        <a
          href="{{ url_for('recipes.detail', id=r.id) }}"
          class="btn btn-outline-primary btn-sm w-100 mt-3 rounded-pill"
          >Buka Resep</a
        >
      </div>
    </div>
  </div>
  {% else %}
  <div class="col-12 text-center py-5 text-muted">
    Anda belum memiliki resep yang disimpan.
  </div>
  {% endfor %}
</div>
{% endblock %}
